
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números com JS</title>
    <style>
        body { font: 12pt Arial; text-align: center;}
        button { font-size: 12pt; padding: 30px;  }
        input{
            height: 80px;
            width: 150px;
            text-align: center;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com números</h1>
    <input type="number" id="inputNumero"><br><br>
    <button onclick="calcular()">Digite um número e clique</button>
    <section id="res">
        <p>O resultado vem aqui...</p>
    </section>

    <script>
        function calcular() {
            const inputNumero = document.getElementById("inputNumero");
            let n1 = inputNumero.value.trim();
            let res = document.querySelector('section#res')
            res.innerHTML = `<p>O dobro de ${n1} é ${n1*2} e a metade é ${n1/2}!</p>`;
            res.style.color = "red";
            inputNumero.value = ""    
        }

</script>
</body>
</html>
