<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 03</title>
    <link rel="shortcut icon" href="../../../../JavaScript/favicon.ico" type="image/x-icon">
    <style>
        body{ 
            text-align: center; 
            font-size: 1.5em;
        }
        button{
            padding: 20px;
            margin: 20px;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <img 
        id="luz"
        src="apagada.png" 
        alt="">
    <br><button 
        id="acende" 
        onclick="acendeLuz()">
        acende luz
    <button>    
    <br><button 
        id="apaga" 
        onclick="apagaLuz()">
        apaga luz
    <button>
    <script>
        function acendeLuz() {
            document.getElementById("luz").src="acesa.png"
        }
        function apagaLuz() {
            document.getElementById("luz").src="apagada.png"
        }
    </script>    
</body>
</html>
