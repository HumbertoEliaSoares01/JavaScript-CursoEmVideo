<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 02</title>
    <link rel="shortcut icon" href="../../../../JavaScript/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="exercício.css">
</head>
<body>
    <h2 id="h2">O que o JavaScript pode fazer?</h2>
    <p id="paragrafo"></p>
    <button 
        id="botaoClick"
        type="button" 
        onclick=ola()>
        Click Me!
    </button>
    <script>
        function ola(){
            document.getElementById("paragrafo").textContent = "JavaScript também pode alterar o CSS";
            document.getElementById("paragrafo").style.color = "red";
            document.getElementById("paragrafo").style.fontSize = "1.2em";
            document.getElementById("h2").style.color= "green";
            document.getElementById("botaoClick").style.opacity = "0";            
        }
    </script>
</body>
</html>
