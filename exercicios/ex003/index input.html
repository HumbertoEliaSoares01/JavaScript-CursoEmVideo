<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input</title>
    <style>
        body { 
            text-align: center;    
            font: 12pt Arial; 
        }
        button { font-size: 12pt; padding: 30px; }
        input{
            padding: 3% 2%;
            margin: 2%;
            text-align: center;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1 style="color: red;">
        Recebendo entrada de dados com &lt;input&gt;
    </h1><br>
    <input 
        id="inputNome"
        placeholder="Digite seu nome:"
        type="text"><br>
    <button onclick="dizNome()">Clique para começar</button>
    <script>
        function dizNome() {
        const inputNome = document.getElementById("inputNome");
        let nome = inputNome.value.trim();
        alert(`Olá, ${nome} É um prazer te conhecer!`);
        inputNome.value = ""    
    }
    </script>
</body>
</html>
