<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números com JS</title>
    <style>
        body { font: 12pt Arial; text-align: center;}
        button { 
            font-size: 48pt; 
            padding: 10px;
            width: 100px;
            border-radius: 50%;
        }
        input{
            height: 80px;
            width: 150px;
            text-align: center;
            font-size: 1.5em;
            margin: auto 5%;
        }
        #res{
            font-size: 2em;
        }
        span{
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com números</h1>
    <input type="number" id="inputNumero1">
    <input type="number" id="inputNumero2"><br><br>
    <button onclick="calcular()">
        +
    </button>
    <section id="res">
        <p>Digite dois números e clique no <span> + </span> </p>
    </section>

    <script>
            function calcular() {
            const inputNumero1 = document.getElementById("inputNumero1");
            const inputNumero2 = document.getElementById("inputNumero2");
            let n1 = Number(inputNumero1.value.trim());
            let n2 = Number(inputNumero2.value.trim());
            let soma = n1+n2;
            let res = document.querySelector('section#res')
            res.innerHTML = `<p>A soma de ${n1} com ${n2} é ${soma}!</p>`
            res.style.color = "red";

        }
    </script>
</body>
</html>
